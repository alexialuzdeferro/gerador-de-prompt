<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/pombagiras/melusine/main/Al%C3%AA%20(3)%20(3)%20(1).png">
    <title>Portal Visceral - Gerador</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #030303; --accent: #4a0000; --text: #a0a0a0; --bright: #ff1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .card { width: 100%; max-width: 420px; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 25px; box-shadow: 0 0 40px rgba(0,0,0,1); }
        h1 { font-size: 0.9rem; text-align: center; letter-spacing: 6px; color: var(--bright); text-transform: uppercase; border-bottom: 1px solid var(--accent); padding-bottom: 15px; margin-top: 0; }
        #display { background: #000; padding: 25px; min-height: 180px; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.7; border: 1px solid #111; display: flex; align-items: center; justify-content: center; text-align: center; color: #eee; cursor: pointer; transition: 0.3s; }
        #display:active { color: var(--bright); border-color: var(--accent); }
        .btns { display: grid; gap: 10px; }
        button { background: var(--accent); color: #fff; border: none; padding: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 2px; transition: 0.2s; }
        button:hover { background: #600000; }
        .secondary-btn { background: transparent; border: 1px solid #333; color: #666; font-size: 0.75rem; }
        .secondary-btn:hover { border-color: var(--bright); color: #999; }
        #log { text-align: center; font-size: 0.65rem; margin-top: 15px; color: var(--bright); height: 12px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Portal Visceral Promps</h1>
    <div id="display" onclick="copy()">Toque para conjurar a essência...</div>
    
    <div class="btns">
        <button onclick="gerar()">Conjurar Prompt</button>
        <button class="secondary-btn" onclick="salvar()">Eternizar no Supabase</button>
        <button class="secondary-btn" onclick="window.location.href='arquivo.html'">Abrir Grimório Eternizado</button>
    </div>
    
    <div id="log"></div>
</div>

<script>
    // Configurações do seu Supabase em Oregon
    const S_URL = "https://rbygxkbewzknvjjhxdvw.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieWd4a2Jld3prbnZqamh4ZHZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYwMDcxNjQsImV4cCI6MjA4MTU4MzE2NH0.YrHF9HEGo6yv9MyNsPzFgBhaAB1DRh2SLU8f7L6s1nY";
    const sb = supabase.createClient(S_URL, S_KEY);

    // Matriz de dados viscerais e góticos
    const m = {
        ent: ["Maria Padilha das Almas", "Sete Saias do Cabaré", "Rainha do Lodo Abissal", "Maria Mulambo", "Dama da Noite Espectral", "Rosa Caveira em Majestade", "Pombagira Cigana do Oriente"],
        vis: ["em sedas vitorianas rasgadas", "envolta em veludo carmesim profundo", "com joias de prata oxidada e ossos", "vestindo rendas negras ancestrais", "coberta por uma névoa de absinto"],
        at: ["dançando sobre brasas e rosas secas", "emergindo de um espelho trincado", "soprando fumaça de charuto ancestral", "observando o vácuo com desdém real", "tecendo sombras em um tear de destinos"],
        loc: ["na encruzilhada do abismo", "no palácio em ruínas e mofado", "sob o luar de um cemitério gótico", "no salão de baile esquecido pelo tempo", "diante do portal de ferro do submundo"],
        det: ["com luz de velas bruxuleantes", "entre crânios e oferendas sagradas", "com pétalas negras caindo em slow motion", "sob um céu opressivo cor de chumbo", "cercada por fumaça etérea e sombria"],
        est: ["Chiaroscuro intenso", "Estética Visceral Gótica", "Hyper-realistic 8k texture", "Noir Cinematográfico", "Atmosfera Lynchiana surreal", "Grão de filme 35mm horror"]
    };

    let pAtual = "";

    function gerar() {
        const r = (a) => a[Math.floor(Math.random() * a.length)];
        // Montagem do prompt denso
        pAtual = `Cinematic shot: ${r(m.ent)}, ${r(m.vis)}, ${r(m.at)} ${r(m.loc)}. ${r(m.det)}. ${r(m.est)} --ar 9:16 --v 6.0 --stylize 300`;
        document.getElementById('display').innerText = pAtual;
        show("Essência Conjurada");
    }

    async function salvar() {
        if(!pAtual) { show("Gere algo primeiro"); return; }
        show("Enviando para o Abismo...");
        
        // Inserção usando o nome correto da coluna: corpo_prompt
        const { error } = await sb.from('grimorio_prompts').insert([{ corpo_prompt: pAtual }]);
        
        if(error) { 
            show("Erro na Conexão"); 
            console.error(err);
        } else { 
            show("Eternizado com Sucesso!"); 
            copy(); 
        }
    }

    function copy() {
        const t = document.getElementById('display').innerText;
        if(t.includes("Toque")) return;
        navigator.clipboard.writeText(t);
        show("Copiado para o Grimório!");
    }

    function show(msg) { 
        document.getElementById('log').innerText = msg; 
        setTimeout(() => document.getElementById('log').innerText="", 3000); 
    }
</script>

</body>
</html>
