<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Visceral V2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #030303; --accent: #4a0000; --text: #a0a0a0; --bright: #ff1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .card { width: 100%; max-width: 420px; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; box-shadow: 0 0 30px rgba(0,0,0,1); }
        h1 { font-size: 0.9rem; text-align: center; letter-spacing: 6px; color: var(--bright); text-transform: uppercase; border-bottom: 1px solid var(--accent); padding-bottom: 15px; }
        #display { background: #000; padding: 25px; min-height: 180px; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.7; border: 1px solid #111; display: flex; align-items: center; justify-content: center; text-align: center; color: #eee; cursor: pointer; transition: 0.3s; }
        #display:active { color: var(--bright); border-color: var(--accent); }
        .btns { display: grid; gap: 10px; }
        button { background: var(--accent); color: #fff; border: none; padding: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 2px; }
        .save { background: transparent; border: 1px solid #333; color: #666; font-size: 0.75rem; }
        #log { text-align: center; font-size: 0.65rem; margin-top: 15px; color: var(--bright); height: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h1>Portal Visceral 2026</h1>
    <div id="display" onclick="copy()">Toque para conjurar a essência...</div>
    <div class="btns">
        <button onclick="gerar()">Conjurar Prompt</button>
        <button class="save" onclick="salvar()">Eternizar no Supabase</button>
    </div>
    <div id="log"></div>
</div>

<script>
    const S_URL = "https://rbygxkbewzknvjjhxdvw.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieWd4a2Jld3prbnZqamh4ZHZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYwMDcxNjQsImV4cCI6MjA4MTU4MzE2NH0.YrHF9HEGo6yv9MyNsPzFgBhaAB1DRh2SLU8f7L6s1nY";
    const sb = supabase.createClient(S_URL, S_KEY);

    const m = {
        ent: ["Maria Padilha das Almas", "Sete Saias do Cabaré", "Rainha do Lodo", "Maria Mulambo", "Dama da Noite Espectral", "Rosa Caveira", "Pombagira Cigana"],
        vis: ["em sedas vitorianas rasgadas", "envolta em veludo carmesim profundo", "com joias de prata oxidada", "vestindo rendas negras ancestrais", "coberta por névoa de absinto"],
        at: ["dançando sobre cinzas e rosas", "emergindo de um espelho trincado", "soprando fumaça de charuto", "observando o vácuo com desdém", "tecendo sombras em um tear"],
        loc: ["na encruzilhada do abismo", "no palácio em ruínas", "sob o luar de um cemitério", "no salão de baile esquecido", "diante do portal de ferro"],
        det: ["com luz de velas bruxuleantes", "entre crânios e oferendas", "com pétalas caindo em slow motion", "sob um céu cor de chumbo", "com fumaça etérea"],
        est: ["Chiaroscuro intenso", "Estética Visceral", "Hyper-realistic 8k", "Noir Cinematográfico", "Atmosfera Lynchiana", "Grão de filme 35mm"]
    };

    let pAtual = "";

    function gerar() {
        const r = (a) => a[Math.floor(Math.random() * a.length)];
        pAtual = `Cinematic shot: ${r(m.ent)}, ${r(m.vis)}, ${r(m.at)} ${r(m.loc)}. ${r(m.det)}. ${r(m.est)} --ar 9:16 --v 6.0 --stylize 300`;
        document.getElementById('display').innerText = pAtual;
        show("Gerado");
    }

    async function salvar() {
        if(!pAtual) return;
        show("Enviando para Oregon...");
        const { error } = await sb.from('grimorio_prompts').insert([{ corpo_prompt: pAtual }]);
        if(error) { show("Erro RLS"); console.log(error); }
        else { show("Eternizado!"); copy(); }
    }

    function copy() {
        const t = document.getElementById('display').innerText;
        if(t.includes("Toque")) return;
        navigator.clipboard.writeText(t);
        show("Copiado!");
    }

    function show(msg) { document.getElementById('log').innerText = msg; setTimeout(() => document.getElementById('log').innerText="", 2000); }
</script>

</body>
</html>
