name: Manter Portal Visceral Vivo

on:
  schedule:
    - cron: '0 0 */5 * *' # Executa a cada 5 dias
  workflow_dispatch: # Permite que você execute manualmente para testar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Acordar Supabase em Oregon
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/grimorio_prompts?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
